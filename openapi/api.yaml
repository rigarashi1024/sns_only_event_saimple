openapi: 3.0.3
info:
  title: Event Driven SNS API
  version: 0.1.0
  description: |
    Event driven SNS backend API.
servers:
  - url: http://localhost:8081/api/v1
tags:
  - name: health
  - name: auth
  - name: timeline
  - name: profile
paths:
  /api/v1/healthz:
    get:
      tags:
        - health
      operationId: getHealthz
      summary: Health check endpoint
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthzResponse"
  /api/v1/auth/login:
    post:
      tags:
        - auth
      operationId: postAuthLogin
      summary: Login with id and password
      description: |
        Firestore の users コレクションに保存されたユーザーを login_id または email で検索し、
        リクエストの平文 password を保存済みの bcrypt ハッシュと照合します。
        password_hash は API リクエスト/レスポンスには含めず、Firestore 内部の認証用フィールドとして扱います。
        認証成功後は session_id と jti を生成し、session_id / user_id / jti / exp を含む internal JWT と
        local provider 相当の access token / refresh token を発行します。
        フロントには internal JWT を HttpOnly cookie として返却し、Firestore の sessions コレクションには AES-GCM で暗号化した
        provider access token / provider refresh token と internal JWT のメタデータを保存します。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Authentication failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/timeline:
    get:
      tags:
        - timeline
      operationId: getTimeline
      summary: Get timeline entries for the authenticated user
      description: |
        認証済みユーザー向けに、事前構築済みの timelines コレクションからタイムラインを取得します。
        初期実装ではログインユーザー自身の投稿と、フォロー中ユーザーの投稿が格納済みである前提です。
      responses:
        "200":
          description: Timeline fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimelineListResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/v1/profile:
    get:
      tags:
        - profile
      operationId: getProfile
      summary: Get profile for the authenticated user
      description: |
        認証済みユーザー向けに、自分のプロフィール情報と過去の投稿一覧を返します。
        初期実装ではログイン中ユーザー自身の情報のみを対象とします。
      responses:
        "200":
          description: Profile fetched successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProfileResponse"
        "401":
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
components:
  schemas:
    HealthzResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          example: ok
    LoginRequest:
      type: object
      required:
        - login_id
        - password
      properties:
        login_id:
          type: string
          description: User login id or email
          example: test-user
        password:
          type: string
          format: password
          description: |
            Login password. The API receives this value as plaintext over HTTPS and compares it with the bcrypt hash stored in Firestore.
          example: password
    LoginResponse:
      type: object
      required:
        - internal_token_type
        - internal_expires_in
      properties:
        internal_token_type:
          type: string
          description: Token type of the internal access token stored in the HttpOnly cookie.
          example: Bearer
        internal_expires_in:
          type: integer
          format: int32
          description: Lifetime in seconds of the internal access token stored in the HttpOnly cookie.
          example: 900
    TimelineEntry:
      type: object
      required:
        - id
        - post_id
        - post_user_id
        - content
        - post_created_at
        - timeline_owner_user_id
        - created_at
        - updated_at
      properties:
        id:
          type: string
          example: timeline-test-user-post-user-002-001
        post_id:
          type: string
          example: post-user-002-001
        post_user_id:
          type: string
          example: user-002
        content:
          type: string
          example: user-002 の投稿です。タイムライン表示確認用です。
        post_created_at:
          type: string
          format: date-time
          example: 2026-05-05T10:00:00Z
        timeline_owner_user_id:
          type: string
          example: test-user
        created_at:
          type: string
          format: date-time
          example: 2026-05-05T10:01:00Z
        updated_at:
          type: string
          format: date-time
          example: 2026-05-05T10:01:00Z
    TimelineListResponse:
      type: object
      required:
        - items
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/TimelineEntry"
    UserProfile:
      type: object
      required:
        - id
        - name
        - email
        - nickname
      properties:
        id:
          type: string
          example: test-user
        name:
          type: string
          example: Test User
        email:
          type: string
          example: test@example.com
        nickname:
          type: string
          example: test
    UserPostSummary:
      type: object
      required:
        - id
        - user_id
        - content
        - like_count
        - comment_count
        - created_at
        - updated_at
      properties:
        id:
          type: string
          example: post-test-user-001
        user_id:
          type: string
          example: test-user
        content:
          type: string
          example: test-user からの最初の投稿です。
        like_count:
          type: integer
          format: int32
          example: 1
        comment_count:
          type: integer
          format: int32
          example: 0
        created_at:
          type: string
          format: date-time
          example: 2026-05-05T09:00:00Z
        updated_at:
          type: string
          format: date-time
          example: 2026-05-05T09:00:00Z
    ProfileResponse:
      type: object
      required:
        - user
        - posts
      properties:
        user:
          $ref: "#/components/schemas/UserProfile"
        posts:
          type: array
          items:
            $ref: "#/components/schemas/UserPostSummary"
    ErrorResponse:
      type: object
      required:
        - message
      properties:
        message:
          type: string
          example: invalid credentials
